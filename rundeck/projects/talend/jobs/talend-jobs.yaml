# Rundeck job definitions for the "talend" project.
# Imported by the bootstrap job. Fixed UUIDs make re-import idempotent.
#
# Execution model: jobs run on the `talend-runner` node (over SSH). The runner
# shares the `artifacts` volume with the builder, so a JAR compiled by the
# builder is immediately runnable here.

- uuid: 11111111-1111-4111-8111-1111111111a1
  name: Run Talend Job
  group: ''
  description: |
    Execute a previously compiled Talend job on the runner node.
    The artifact is looked up under /artifacts/<JOB_NAME>/.
  loglevel: INFO
  executionEnabled: true
  nodeFilterEditable: false
  nodefilters:
    dispatch:
      keepgoing: false
      rankOrder: ascending
      threadcount: '1'
    filter: 'name: talend-runner'
  nodesSelectedByDefault: true
  options:
    - name: JOB_NAME
      description: 'Talend job name (folder/jar base name under /artifacts)'
      required: true
    - name: CONTEXT
      description: 'Talend context to run with'
      value: Default
    - name: JOB_ARGS
      description: 'Extra arguments passed to the job (e.g. --context_param key=value)'
      value: ''
  sequence:
    keepgoing: false
    strategy: node-first
    commands:
      - description: Run the Talend job artifact
        script: |
          #!/bin/bash
          set -euo pipefail
          JOB="@option.JOB_NAME@"
          CTX="@option.CONTEXT@"
          ARGS="@option.JOB_ARGS@"
          BASE="/artifacts/${JOB}"
          echo "[talend-runner] Running ${JOB} (context=${CTX})"
          if [ -x "${BASE}/${JOB}_run.sh" ]; then
            exec "${BASE}/${JOB}_run.sh" --context="${CTX}" ${ARGS}
          elif [ -f "${BASE}/${JOB}.jar" ]; then
            exec java -jar "${BASE}/${JOB}.jar" --context="${CTX}" ${ARGS}
          elif [ -f "/artifacts/${JOB}.jar" ]; then
            exec java -jar "/artifacts/${JOB}.jar" --context="${CTX}" ${ARGS}
          else
            echo "ERROR: no artifact for '${JOB}' under /artifacts" >&2
            ls -la /artifacts >&2 || true
            exit 2
          fi

- uuid: 22222222-2222-4222-8222-2222222222b2
  name: Build and Deploy Talend Job
  group: ''
  description: |
    Clone a Talend project from Git, compile it with the builder, then run the
    resulting artifact. Triggered manually or by the webhook handler on push.
  loglevel: INFO
  executionEnabled: true
  nodeFilterEditable: false
  nodefilters:
    dispatch:
      keepgoing: false
      rankOrder: ascending
      threadcount: '1'
    filter: 'name: talend-runner'
  nodesSelectedByDefault: true
  options:
    - name: GIT_URL
      description: 'Git URL of the Talend project repository'
      required: true
    - name: GIT_BRANCH
      description: 'Branch to build'
      value: main
    - name: JOB_NAME
      description: 'Talend job to build and run'
      required: true
    - name: CONTEXT
      description: 'Talend context to run with'
      value: Default
    - name: RUN_AFTER_BUILD
      description: 'Run the job after a successful build'
      value: 'true'
      values: ['true', 'false']
  sequence:
    keepgoing: false
    strategy: node-first
    commands:
      - description: Build via the builder API
        script: |
          #!/bin/bash
          set -euo pipefail
          echo "[build] Requesting build of @option.JOB_NAME@ from @option.GIT_URL@ (@option.GIT_BRANCH@)"
          curl -fsS -X POST "http://talend-builder:8080/build" \
            -H 'Content-Type: application/json' \
            -d "{\"git_url\":\"@option.GIT_URL@\",\"branch\":\"@option.GIT_BRANCH@\",\"job_name\":\"@option.JOB_NAME@\"}"
          echo
      - description: Run the freshly built artifact
        script: |
          #!/bin/bash
          set -euo pipefail
          [ "@option.RUN_AFTER_BUILD@" = "true" ] || { echo "RUN_AFTER_BUILD=false, skipping run"; exit 0; }
          JOB="@option.JOB_NAME@"
          BASE="/artifacts/${JOB}"
          if [ -x "${BASE}/${JOB}_run.sh" ]; then
            exec "${BASE}/${JOB}_run.sh" --context="@option.CONTEXT@"
          elif [ -f "${BASE}/${JOB}.jar" ]; then
            exec java -jar "${BASE}/${JOB}.jar" --context="@option.CONTEXT@"
          else
            echo "ERROR: build reported success but no artifact for '${JOB}'" >&2
            exit 2
          fi

- uuid: 33333333-3333-4333-8333-3333333333c3
  name: Scheduled Talend Pipeline
  group: ''
  description: |
    Example of a scheduled Talend job chain. Schedule is DISABLED by default;
    enable it from the Rundeck UI once you have configured your jobs.
  loglevel: INFO
  executionEnabled: true
  scheduleEnabled: false
  schedule:
    time:
      hour: '02'
      minute: '00'
      seconds: '0'
    month: '*'
    weekday:
      day: '*'
    year: '*'
  nodeFilterEditable: false
  nodefilters:
    dispatch:
      keepgoing: false
      rankOrder: ascending
      threadcount: '1'
    filter: 'name: talend-runner'
  nodesSelectedByDefault: true
  options:
    - name: JOB_NAME
      description: 'Talend job to run nightly'
      value: TestLogJob
      required: true
    - name: CONTEXT
      value: Production
  sequence:
    keepgoing: false
    strategy: node-first
    commands:
      - description: Run nightly Talend job
        script: |
          #!/bin/bash
          set -euo pipefail
          JOB="@option.JOB_NAME@"
          BASE="/artifacts/${JOB}"
          echo "[scheduled] Running ${JOB} (context=@option.CONTEXT@)"
          if [ -x "${BASE}/${JOB}_run.sh" ]; then
            exec "${BASE}/${JOB}_run.sh" --context="@option.CONTEXT@"
          elif [ -f "${BASE}/${JOB}.jar" ]; then
            exec java -jar "${BASE}/${JOB}.jar" --context="@option.CONTEXT@"
          else
            echo "ERROR: no artifact for '${JOB}' under /artifacts" >&2
            exit 2
          fi
