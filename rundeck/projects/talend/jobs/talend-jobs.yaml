# Rundeck job definitions for the "talend" project.
# Imported by the bootstrap job. Fixed UUIDs make re-import idempotent.
#
# Execution model: jobs dispatch over SSH to runner nodes selected by TAG
# (option RUNNER_TAG -> node filter `tags: ${option.RUNNER_TAG}`). Every
# runner node ships /usr/local/bin/run-talend-job, the unified launcher that
# handles artifact lookup, --context, --context_param pairs and JVM options.
# To add runners, see rundeck/etc/talend-resources.yaml.
#
# Common options:
#   JOB_NAME        Talend job (folder/jar base name under /artifacts)
#   CONTEXT         Talend context (--context=X), e.g. Default/Test/Production
#   CONTEXT_PARAMS  key=value pairs (newline or ';' separated) -> --context_param
#   JVM_OPTS        JVM flags (-Xms/-Xmx/GC/-D...) applied to the job JVM
#   JOB_ARGS        extra raw arguments appended verbatim
#   RUNNER_TAG      tag of the runner node(s) to dispatch to

- uuid: 11111111-1111-4111-8111-1111111111a1
  name: Run Talend Job
  group: ''
  description: |
    Execute a previously compiled Talend job on a runner node.
    The artifact is looked up under /artifacts/<JOB_NAME>/.
  loglevel: INFO
  executionEnabled: true
  nodeFilterEditable: true
  nodefilters:
    dispatch:
      keepgoing: false
      rankOrder: ascending
      threadcount: '1'
    filter: 'tags: ${option.RUNNER_TAG}'
  nodesSelectedByDefault: true
  options:
    - name: JOB_NAME
      description: 'Talend job name (folder/jar base name under /artifacts)'
      required: true
    - name: CONTEXT
      description: 'Talend context to run with (--context=X)'
      value: Default
      values: [Default, Test, Production]
      enforced: false
    - name: CONTEXT_PARAMS
      description: 'Context params as key=value pairs, separated by ";" or newlines (e.g. db_host=pg;batch_size=500)'
      value: ''
    - name: JVM_OPTS
      description: 'JVM options for the job (e.g. -Xms512M -Xmx4G -Duser.timezone=UTC)'
      value: '-Xms256M -Xmx1024M'
    - name: JOB_ARGS
      description: 'Extra raw arguments appended to the command line'
      value: ''
    - name: RUNNER_TAG
      description: 'Tag of the runner node(s) to execute on (see talend-resources.yaml)'
      value: default
      required: true
  sequence:
    keepgoing: false
    strategy: node-first
    commands:
      - description: Run the Talend job artifact
        script: |
          #!/bin/bash
          set -euo pipefail
          export TALEND_CONTEXT='@option.CONTEXT@'
          export TALEND_CONTEXT_PARAMS='@option.CONTEXT_PARAMS@'
          export TALEND_JVM_OPTS='@option.JVM_OPTS@'
          export TALEND_JOB_ARGS='@option.JOB_ARGS@'
          exec run-talend-job '@option.JOB_NAME@'

- uuid: 22222222-2222-4222-8222-2222222222b2
  name: Build and Deploy Talend Job
  group: ''
  description: |
    Clone a Talend project from Git, compile it with the builder, then run the
    resulting artifact. Triggered manually or by the webhook handler on push.
  loglevel: INFO
  executionEnabled: true
  nodeFilterEditable: true
  nodefilters:
    dispatch:
      keepgoing: false
      rankOrder: ascending
      threadcount: '1'
    filter: 'tags: ${option.RUNNER_TAG}'
  nodesSelectedByDefault: true
  options:
    - name: GIT_URL
      description: 'Git URL of the Talend project repository'
      required: true
    - name: GIT_BRANCH
      description: 'Branch to build'
      value: main
    - name: JOB_NAME
      description: 'Talend job to build and run'
      required: true
    - name: BUILDER
      description: 'maven = Maven project / Studio export in the repo; tos = raw Studio sources (talend.project + .item), built by the headless TOS CI-builder'
      value: maven
      values: [maven, tos]
      enforced: true
    - name: CONTEXT
      description: 'Talend context to run with (--context=X)'
      value: Default
      values: [Default, Test, Production]
      enforced: false
    - name: CONTEXT_PARAMS
      description: 'Context params as key=value pairs, separated by ";" or newlines'
      value: ''
    - name: JVM_OPTS
      description: 'JVM options for the job run (e.g. -Xms512M -Xmx4G)'
      value: '-Xms256M -Xmx1024M'
    - name: RUNNER_TAG
      description: 'Tag of the runner node(s) to execute on'
      value: default
      required: true
    - name: RUN_AFTER_BUILD
      description: 'Run the job after a successful build'
      value: 'true'
      values: ['true', 'false']
  sequence:
    keepgoing: false
    strategy: node-first
    commands:
      - description: Build via the builder API
        script: |
          #!/bin/bash
          set -euo pipefail
          case "@option.BUILDER@" in
            tos) BUILDER_URL="http://tos-builder:8080" ;;
            *)   BUILDER_URL="http://talend-builder:8080" ;;
          esac
          echo "[build] Requesting @option.BUILDER@ build of @option.JOB_NAME@ from @option.GIT_URL@ (@option.GIT_BRANCH@)"
          # TOS builds include headless code generation and on-demand library
          # resolution: allow up to 1h (Maven builds finish far sooner).
          curl -fsS --max-time 3600 -X POST "${BUILDER_URL}/build" \
            -H 'Content-Type: application/json' \
            -d "{\"git_url\":\"@option.GIT_URL@\",\"branch\":\"@option.GIT_BRANCH@\",\"job_name\":\"@option.JOB_NAME@\"}"
          echo
      - description: Run the freshly built artifact
        script: |
          #!/bin/bash
          set -euo pipefail
          [ "@option.RUN_AFTER_BUILD@" = "true" ] || { echo "RUN_AFTER_BUILD=false, skipping run"; exit 0; }
          export TALEND_CONTEXT='@option.CONTEXT@'
          export TALEND_CONTEXT_PARAMS='@option.CONTEXT_PARAMS@'
          export TALEND_JVM_OPTS='@option.JVM_OPTS@'
          exec run-talend-job '@option.JOB_NAME@'

- uuid: 33333333-3333-4333-8333-3333333333c3
  name: Scheduled Talend Pipeline
  group: ''
  description: |
    Example of a scheduled Talend job chain. Schedule is DISABLED by default;
    enable it from the Rundeck UI once you have configured your jobs.
  loglevel: INFO
  executionEnabled: true
  scheduleEnabled: false
  schedule:
    time:
      hour: '02'
      minute: '00'
      seconds: '0'
    month: '*'
    weekday:
      day: '*'
    year: '*'
  nodeFilterEditable: true
  nodefilters:
    dispatch:
      keepgoing: false
      rankOrder: ascending
      threadcount: '1'
    filter: 'tags: ${option.RUNNER_TAG}'
  nodesSelectedByDefault: true
  options:
    - name: JOB_NAME
      description: 'Talend job to run nightly'
      value: TestLogJob
      required: true
    - name: CONTEXT
      value: Production
    - name: CONTEXT_PARAMS
      description: 'Context params as key=value pairs, separated by ";" or newlines'
      value: ''
    - name: JVM_OPTS
      description: 'JVM options for the nightly run'
      value: '-Xms256M -Xmx2048M'
    - name: RUNNER_TAG
      description: 'Tag of the runner node(s) to execute on'
      value: default
      required: true
  sequence:
    keepgoing: false
    strategy: node-first
    commands:
      - description: Run nightly Talend job
        script: |
          #!/bin/bash
          set -euo pipefail
          export TALEND_CONTEXT='@option.CONTEXT@'
          export TALEND_CONTEXT_PARAMS='@option.CONTEXT_PARAMS@'
          export TALEND_JVM_OPTS='@option.JVM_OPTS@'
          exec run-talend-job '@option.JOB_NAME@'
