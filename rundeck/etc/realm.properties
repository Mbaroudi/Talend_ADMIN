# Rundeck users / roles (Jetty realm).
# Format:  username: password,role1,role2,...
#
# SECURITY: this is a starter default. Change the admin password here AND keep
# RUNDECK_ADMIN_PASSWORD in your .env in sync (the bootstrap job and webhook
# handler authenticate with these credentials).
#
# The `admin` role grants full access via the default aclpolicy shipped with
# the image. The `operator` user below is an example read/run-only account
# (see rundeck/acl/operator.aclpolicy, applied by the bootstrap job).

admin:change-me-rundeck,user,admin,architect,deploy,build
operator:change-me-operator,user,operator
